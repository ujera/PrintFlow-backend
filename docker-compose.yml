version: '3.8'

services:
  db:
    image: postgres:16
    container_name: printflow-db
    environment:
      POSTGRES_DB: printflow_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - printflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: printflow-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: printflow-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=printflow_db;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
      - Jwt__Key=YourSuperSecretKeyThatIsAtLeast32Characters!
      - Jwt__Issuer=PrintFlow
      - Jwt__Audience=PrintFlowClients
      - Stripe__SecretKey=sk_test_YOUR_REAL_KEY_HERE
      - Stripe__PublishableKey=pk_test_YOUR_REAL_KEY_HERE
      - Stripe__WebhookSecret=whsec_YOUR_SECRET_HERE
      - Google__ClientId=539054122418-v4h1tk1ja5si1psc0on410fq0vbqpg40.apps.googleusercontent.com
      - Smtp__Host=sandbox.smtp.mailtrap.io
      - Smtp__Port=587
      - Smtp__Username=YOUR_MAILTRAP_USERNAME
      - Smtp__Password=YOUR_MAILTRAP_PASSWORD
      - Smtp__FromEmail=noreply@printflow.io
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: printflow-worker
    environment:
      - DOTNET_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=printflow_db;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  printflow_data: